<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Portfolio & Career Journey</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .path-container {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin: 2rem 0 4rem 0;
            padding: 0 1rem;
        }

        /* The background progress line */
        .path-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #334155;
            transform: translateY(-50%);
            z-index: 1;
        }

        .path-line-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.4s ease;
        }

        .step-node {
            position: relative;
            z-index: 2;
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: 3px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step-node:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .step-node.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary);
        }

        .step-label {
            position: absolute;
            top: 60px;
            font-size: 0.85rem;
            white-space: nowrap;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .step-node.active .step-label {
            color: var(--primary);
            font-weight: 600;
        }

        .content-display {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            min-height: 250px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .role-title {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }

        .company-timeline {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .description-list {
            list-style-position: inside;
        }

        .description-list li {
            margin-bottom: 0.8rem;
            color: #cbd5e1;
        }

        @media (max-width: 768px) {
            .path-container {
                flex-direction: column;
                height: 400px;
                align-items: flex-start;
                padding-left: 2rem;
            }

            .path-line {
                top: 0;
                bottom: 0;
                left: 44px;
                width: 4px;
                height: 100%;
                transform: none;
            }

            .path-line-fill {
                width: 100%;
                height: 0%;
            }

            .step-node {
                width: 44px;
                height: 44px;
            }

            .step-label {
                top: 8px;
                left: 65px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Alex Morgan</h1>
        <p>Interactive Career Journey</p>
    </header>

    <div class="path-container">
        <div class="path-line">
            <div class="path-line-fill" id="lineFill"></div>
        </div>

        <div class="step-node active" onclick="showStep(0)">1
            <span class="step-label">The Beginning</span>
        </div>
        <div class="step-node" onclick="showStep(1)">2
            <span class="step-label">First Milestone</span>
        </div>
        <div class="step-node" onclick="showStep(2)">3
            <span class="step-label">The Pivot</span>
        </div>
        <div class="step-node" onclick="showStep(3)">4
            <span class="step-label">Leadership</span>
        </div>
        <div class="step-node" onclick="showStep(4)">5
            <span class="step-label">Present Day</span>
        </div>
    </div>

    <div class="content-display" id="contentBox">
        <!-- Content injected via JavaScript -->
    </div>

    <script>
        const careerData = [
            {
                role: "Junior Web Developer",
                company: "Tech Startups Inc. | 2018 - 2019",
                details: [
                    "Built responsive web applications using HTML, CSS, and basic JavaScript.",
                    "Collaborated with UI/UX designers to implement pixel-perfect interfaces.",
                    "Optimized website assets resulting in a 20% increase in loading speed."
                ]
            },
            {
                role: "Software Engineer",
                company: "Innovate Solutions Corp | 2019 - 2021",
                details: [
                    "Developed scalable backend APIs using Node.js and Express.",
                    "Migrated legacy monolithic systems over to modern React micro-frontends.",
                    "Mentored 3 incoming engineering interns on team code standards."
                ]
            },
            {
                role: "Senior Full-Stack Engineer",
                company: "Global Nexus Logistics | 2021 - 2023",
                details: [
                    "Architected cloud-native solutions deployed securely on AWS environments.",
                    "Reduced database query bottlenecks, saving the company $15k monthly.",
                    "Led a cross-functional squad of 6 developers delivering features on-time."
                ]
            },
            {
                role: "Engineering Team Lead",
                company: "Apex Scale Digital | 2023 - 2025",
                details: [
                    "Managed engineering roadmaps, sprint planning, and system architecture.",
                    "Improved overall team velocity by 35% through CI/CD pipeline automation.",
                    "Conducted regular code reviews and career growth mapping for 8 engineers."
                ]
            },
            {
                role: "Principal Solutions Architect",
                company: "Enterprise Cloud Systems | 2025 - Present",
                details: [
                    "Defining long-term technical vision and enterprise infrastructure strategy.",
                    "Overseeing migration strategies for high-traffic core legacy systems.",
                    "Consulting directly with Fortune 500 clients on architecture best practices."
                ]
            }
        ];

        function showStep(index) {
            const nodes = document.querySelectorAll('.step-node');
            const fill = document.getElementById('lineFill');
            const contentBox = document.getElementById('contentBox');

            // Update node highlights
            nodes.forEach((node, idx) => {
                if (idx <= index) {
                    node.classList.add('active');
                } else {
                    node.classList.remove('active');
                }
            });

            // Update line fill percentage
            const percentage = (index / (nodes.length - 1)) * 100;
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                fill.style.height = percentage + '%';
                fill.style.width = '100%';
            } else {
                fill.style.width = percentage + '%';
                fill.style.height = '100%';
            }

            // Update text content with animation
            const data = careerData[index];
            let listItems = data.details.map(item => `<li>${item}</li>`).join('');

            contentBox.innerHTML = `
                <div class="fade-in">
                    <h2 class="role-title">${data.role}</h2>
                    <p class="company-timeline">${data.company}</p>
                    <ul class="description-list">
                        ${listItems}
                    </ul>
                </div>
            `;
        }

        // Initialize first step on load
        showStep(0);

        // Adjust progress bar logic smoothly if screen resizes
        window.addEventListener('resize', () => {
            const activeNode = document.querySelectorAll('.step-node.active'); showStep(activeNode.length - 1);
        });
